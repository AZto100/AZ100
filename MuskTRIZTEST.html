<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck.ai Integration Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .response { white-space: pre-wrap; }
    </style>
</head>
<body class="bg-zinc-950 text-white p-8">

<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-2">Duck.ai Integration Test</h1>
    <p class="text-emerald-400 mb-8">Testing community library: @mumulhl/duckduckgo-ai-chat</p>

    <div class="mb-6">
        <label class="block text-sm mb-2">Your Test Message:</label>
        <textarea id="prompt" rows="3" 
                  class="w-full bg-zinc-900 border border-white/20 rounded-2xl p-4 focus:outline-none focus:border-emerald-400"
                  placeholder="Hello, what is the capital of France?">What are the main benefits of combining TRIZ with first-principles thinking?</textarea>
    </div>

    <div class="flex gap-4 mb-8">
        <button onclick="sendToDuckAI()" 
                class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-black font-semibold py-4 rounded-2xl transition">
            Send to Duck.ai (Real AI)
        </button>
        
        <button onclick="clearResponse()" 
                class="px-6 border border-white/30 hover:border-white/50 rounded-2xl transition">
            Clear
        </button>
    </div>

    <div id="status" class="text-sm mb-4 text-zinc-400"></div>
    
    <div id="response" class="bg-zinc-900 border border-white/10 rounded-3xl p-6 response text-zinc-300 min-h-[150px]"></div>
</div>

<!-- Import the library via JSR (works in modern browsers) -->
<script type="module">
    import { initChat } from "https://jsr.io/@mumulhl/duckduckgo-ai-chat/3.3.0/mod.js";

    let chatInstance = null;

    async function initDuckChat() {
        if (!chatInstance) {
            chatInstance = await initChat({
                model: "gpt-4o-mini"   // Try "claude-3-haiku", "llama", "o3-mini" etc.
            });
        }
        return chatInstance;
    }

    window.sendToDuckAI = async function() {
        const prompt = document.getElementById('prompt').value.trim();
        const statusEl = document.getElementById('status');
        const responseEl = document.getElementById('response');

        if (!prompt) {
            statusEl.textContent = "Please enter a message.";
            return;
        }

        statusEl.innerHTML = `<span class="text-emerald-400">Connecting to Duck.ai...</span>`;
        responseEl.textContent = "Thinking...";

        try {
            const chat = await initDuckChat();
            
            // Send message and get response
            const result = await chat.sendMessage(prompt);
            
            responseEl.textContent = result || "No response received.";
            statusEl.innerHTML = `<span class="text-emerald-400">✓ Response received from Duck.ai (${chat.model || 'gpt-4o-mini'})</span>`;
            
        } catch (err) {
            console.error(err);
            responseEl.innerHTML = `<span class="text-rose-400">Error: ${err.message || 'Failed to connect to Duck.ai'}</span><br><br>Tip: Try refreshing the page or test in another browser.`;
            statusEl.textContent = "Connection failed";
        }
    };

    window.clearResponse = function() {
        document.getElementById('response').textContent = '';
        document.getElementById('status').textContent = '';
    };
</script>

</body>
</html>
